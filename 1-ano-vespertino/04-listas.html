<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Listas em HTML 5</title>
</head>
<body>
  <h1>Listas em HTML 5</h1>
  <h3>Lista Não Ordenada</h3>
  <ul>
    <li>Pão</li>
    <li>Leite</li>
    <li>Café</li>
    <li>Bolacha</li>
  </ul>

  <h3>Lista Ordenada</h3>
  <ol>
    <li>Molhar o cabelo</li>
    <li>Passar o xampu</li>
    <li>Enxaguar o cabelo para retirar o xampu</li>
    <li>Pasaar o condicionador</li>
    <li>Enxaguar o cabelo para retirar o condicionador</li>
  </ol>
</body>
</html>
